            flex-direction: column;
            position: relative;

            font-size: 14px;
            font-weight: 590;
            color: #1c1c1e;
            border-bottom: 0.5px solid #e9e9ef;
        }

        .chat-header {
            background: #ffffff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid #e9e9ef;
        }

        .back-icon {
            font-size: 24px;
            color: #007aff;
            cursor: default;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #1e2b3c, #0f1a24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            font-size: 17px;
            color: #000;
        }

        .chat-status {
            font-size: 12px;
            color: #8e8e93;
        }

        .menu-icon {
            font-size: 22px;
            color: #007aff;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 80%;
            align-items: flex-end;
            gap: 6px;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bot-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 1px 0.5px rgba(0, 0, 0, 0.05);
        }

        .user-bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-bubble {
            background: #e5e5ea;
            color: #000;
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 10px;
            color: #8e8e93;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .user-message .timestamp {
            text-align: right;
        }

        .input-bar {
            background: #ffffff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 0.5px solid #e9e9ef;
        }

        .voice-icon, .emoji-icon, .add-icon {
            font-size: 24px;
            color: #007aff;
            cursor: default;
        }

        .text-field {
            flex: 1;
            background: #f5f5f5;
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 15px;
            outline: none;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }
        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background: #c6c6c8;
            border-radius: 10px;
        }

    function renderMessages() {

        container.innerHTML = '';

            bubbleWrapper.style.display = 'flex';
            bubbleWrapper.style.flexDirection = 'column';

            bubble.className = `bubble ${msg.sender === 'user' ? 'user-bubble' : 'bot-bubble'}`;

            timeSpan.innerText = msg.time;
            
            bubbleWrapper.appendChild(bubble);
            bubbleWrapper.appendChild(timeSpan);
            messageDiv.appendChild(bubbleWrapper);
